version: '3.8'

services:
  xuanling:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # 可选: Redis 缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
