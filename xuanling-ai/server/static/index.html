<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧚 玄灵AI 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; overflow: hidden; }
        
        .header { background: rgba(0,0,0,0.4); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(102, 126, 234, 0.3); backdrop-filter: blur(10px); position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #a0aec0; }
        .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .container { display: flex; height: 100vh; padding-top: 60px; }
        
        .sidebar { width: 200px; background: rgba(0,0,0,0.3); padding: 15px 0; border-right: 1px solid rgba(102, 126, 234, 0.2); }
        .nav-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.3s; color: #a0aec0; font-size: 14px; }
        .nav-item:hover { background: rgba(102, 126, 234, 0.1); color: #fff; }
        .nav-item.active { background: linear-gradient(90deg, rgba(102, 126, 234, 0.3), transparent); color: #667eea; border-left: 3px solid #667eea; }
        
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        
        .panel { display: none; height: 100%; }
        .panel.active { display: flex; flex-direction: column; }
        
        .panel-title { font-size: 20px; margin-bottom: 15px; color: #e2e8f0; }
        
        /* 对话界面 */
        .chat-container { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); border-radius: 16px; overflow: hidden; border: 1px solid rgba(102, 126, 234, 0.2); }
        
        .chat-header { padding: 15px 20px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(102, 126, 234, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .chat-title { font-weight: bold; color: #e2e8f0; }
        .chat-actions { display: flex; gap: 10px; }
        .chat-action { padding: 6px 12px; background: rgba(102, 126, 234, 0.2); border: none; border-radius: 6px; color: #a0aec0; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .chat-action:hover { background: rgba(102, 126, 234, 0.4); color: #fff; }
        
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(102, 126, 234, 0.5); border-radius: 3px; }
        
        .message { margin-bottom: 15px; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { margin-left: auto; }
        .message-content { padding: 12px 18px; border-radius: 18px; line-height: 1.6; font-size: 14px; word-wrap: break-word; }
        .message.ai .message-content { background: rgba(102, 126, 234, 0.2); border-bottom-left-radius: 4px; }
        .message.user .message-content { background: linear-gradient(135deg, #667eea, #764ba2); border-bottom-right-radius: 4px; }
        .message-time { font-size: 11px; color: #666; margin-top: 4px; }
        
        .chat-input { padding: 15px 20px; background: rgba(0,0,0,0.4); display: flex; gap: 12px; border-top: 1px solid rgba(102, 126, 234, 0.2); }
        .chat-input input { flex: 1; padding: 12px 18px; border: 1px solid rgba(102, 126, 234, 0.3); border-radius: 25px; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; outline: none; transition: border 0.3s; }
        .chat-input input:focus { border-color: #667eea; }
        .chat-input input::placeholder { color: #666; }
        .chat-input button { padding: 12px 25px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 25px; color: #fff; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .chat-input button:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 历史记录侧边栏 */
        .history-panel { width: 280px; background: rgba(0,0,0,0.4); border-left: 1px solid rgba(102, 126, 234, 0.2); display: none; flex-direction: column; }
        .history-panel.show { display: flex; }
        .history-header { padding: 15px; border-bottom: 1px solid rgba(102, 126, 234, 0.2); font-weight: bold; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .history-item:hover { background: rgba(102, 126, 234, 0.2); }
        .history-item-title { font-size: 13px; color: #e2e8f0; margin-bottom: 4px; }
        .history-item-time { font-size: 11px; color: #666; }
        
        /* 项目卡片 */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; overflow-y: auto; padding-right: 5px; }
        .projects-grid::-webkit-scrollbar { width: 6px; }
        .projects-grid::-webkit-scrollbar-thumb { background: rgba(102, 126, 234, 0.5); border-radius: 3px; }
        
        .project-card { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; border: 1px solid rgba(102, 126, 234, 0.2); transition: all 0.3s; }
        .project-card:hover { border-color: #667eea; transform: translateY(-3px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2); }
        .project-icon { font-size: 36px; margin-bottom: 12px; }
        .project-name { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .project-desc { color: #a0aec0; font-size: 13px; line-height: 1.5; }
        .project-status { margin-top: 12px; padding: 4px 12px; background: rgba(74, 222, 128, 0.2); color: #4ade80; border-radius: 15px; font-size: 11px; display: inline-block; }
        
        .add-card { background: rgba(102, 126, 234, 0.1); border: 2px dashed rgba(102, 126, 234, 0.4); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 150px; }
        .add-card:hover { border-color: #667eea; background: rgba(102, 126, 234, 0.2); }
        .add-card span { font-size: 36px; color: #667eea; }
        .add-card p { color: #a0aec0; margin-top: 10px; }
        
        /* 记忆 */
        .memory-list { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-right: 5px; }
        .memory-list::-webkit-scrollbar { width: 6px; }
        .memory-list::-webkit-scrollbar-thumb { background: rgba(102, 126, 234, 0.5); border-radius: 3px; }
        
        .memory-item { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 18px; border-left: 3px solid #764ba2; }
        .memory-title { font-weight: bold; color: #e2e8f0; margin-bottom: 6px; font-size: 14px; }
        .memory-content { color: #a0aec0; font-size: 13px; line-height: 1.5; }
        .memory-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
        .memory-tag { padding: 3px 10px; background: rgba(102, 126, 234, 0.2); border-radius: 12px; font-size: 11px; color: #667eea; }
        
        /* 技能 */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .skill-card { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 18px; border: 1px solid rgba(102, 126, 234, 0.2); cursor: pointer; transition: all 0.3s; }
        .skill-card:hover { border-color: #667eea; transform: translateY(-3px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3); }
        .skill-name { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        .skill-desc { color: #a0aec0; font-size: 12px; }
        
        /* 技能详情弹窗 */
        .skill-detail { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 300; justify-content: center; align-items: center; }
        .skill-detail.show { display: flex; }
        .skill-detail-content { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 16px; padding: 30px; width: 450px; border: 1px solid rgba(102, 126, 234, 0.4); }
        .skill-detail-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .skill-detail-desc { color: #a0aec0; line-height: 1.8; margin-bottom: 20px; }
        .skill-close { float: right; background: none; border: none; color: #666; font-size: 24px; cursor: pointer; }
        .skill-close:hover { color: #fff; }
        
        /* 设置 */
        .settings-form { max-width: 500px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: #a0aec0; font-size: 13px; }
        .form-input { width: 100%; padding: 10px 14px; border: 1px solid rgba(102, 126, 234, 0.3); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; font-size: 13px; }
        .form-input:focus { outline: none; border-color: #667eea; }
        .save-btn { padding: 10px 25px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        
        /* 模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1a1a2e; border-radius: 16px; padding: 25px; width: 400px; border: 1px solid rgba(102, 126, 234, 0.3); }
        .modal-title { font-size: 18px; margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .modal-btn { padding: 8px 20px; border-radius: 8px; cursor: pointer; border: none; }
        .modal-btn.cancel { background: rgba(255,255,255,0.1); color: #a0aec0; }
        .modal-btn.confirm { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        
        .loading { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🧚 玄灵AI</div>
        <div class="header-right">
            <div class="status"><div class="status-dot"></div><span>在线</span></div>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="nav-item active" data-panel="chat" onclick="switchTo('chat')"><span>💬</span> AI 对话</div>
            <div class="nav-item" data-panel="projects" onclick="switchTo('projects')"><span>📁</span> 项目管理</div>
            <div class="nav-item" data-panel="agents" onclick="switchTo('agents')"><span>🤖</span> 子代理</div>
            <div class="nav-item" data-panel="memory" onclick="switchTo('memory')"><span>🧠</span> 记忆系统</div>
            <div class="nav-item" data-panel="skills" onclick="switchTo('skills')"><span>🛠️</span> 技能商店</div>
            <div class="nav-item" data-panel="settings" onclick="switchTo('settings')"><span>⚙️</span> 系统设置</div>
            <div class="nav-item" data-panel="local" onclick="switchTo('local')"><span>💻</span> 本地运行</div>
        </div>
        
        <div class="main">
            <!-- 对话面板 -->
            <div class="panel active" id="chat">
                <div class="chat-container">
                    <div class="chat-header">
                        <span class="chat-title">💬 与玄灵AI对话</span>
                        <div class="chat-actions">
                            <button class="chat-action" onclick="toggleHistory()">📜 历史</button>
                            <button class="chat-action" onclick="clearChat()">🗑️ 清空</button>
                        </div>
                    </div>
                    <div class="chat-messages" id="messages">
                        <div class="message ai">
                            <div class="message-content">
                                你好！我是<strong>玄灵AI</strong> 🧚<br><br>
                                我可以帮助你：<br>
                                • 智能对话和问答<br>
                                • 管理项目<br>
                                • 记忆重要信息<br>
                                • 执行各种任务<br><br>
                                有什么可以帮你的吗？
                            </div>
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="userInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                        <button onclick="sendMessage()" id="sendBtn">发送</button>
                    </div>
                </div>
                <div class="history-panel" id="historyPanel">
                    <div class="history-header">
                        <span>对话历史</span>
                        <button onclick="clearAllHistory()" style="float:right;background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;">清空</button>
                    </div>
                    <div style="padding:10px;border-bottom:1px solid rgba(102,126,234,0.2);">
                        <input type="text" id="historySearch" placeholder="搜索历史..." onkeyup="searchHistory(this.value)" style="width:100%;padding:8px;border:1px solid rgba(102,126,234,0.3);border-radius:6px;background:rgba(0,0,0,0.3);color:#fff;font-size:12px;">
                    </div>
                    <div class="history-list" id="historyList"></div>
                </div>
            </div>
            
            <!-- 项目面板 -->
            <div class="panel" id="projects">
                <h2 class="panel-title">📁 项目管理</h2>
                <div class="projects-grid" id="projectsGrid"></div>
            </div>
            
            <!-- 子代理面板 -->
            <div class="panel" id="agents">
                <h2 class="panel-title">🤖 子代理管理</h2>
                <div style="margin-bottom:15px;">
                    <button onclick="showAddAgent()" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;">➕ 添加子代理</button>
                </div>
                <div class="projects-grid" id="agentsGrid">
                    <div style="color:#666;padding:20px;">加载中...</div>
                </div>
            </div>
            
            <!-- 记忆面板 -->
            <div class="panel" id="memory">
                <h2 class="panel-title">🧠 记忆系统</h2>
                <div class="memory-list" id="memoryList"></div>
            </div>
            
            <!-- 技能面板 -->
            <div class="panel" id="skills">
                <h2 class="panel-title">🛠️ 技能商店</h2>
                <div class="skills-grid" id="skillsGrid">
                    <div style="color:#666;padding:20px;">加载中...</div>
                </div>
            </div>
            
            <!-- 设置面板 -->
            <div class="panel" id="settings">
                <h2 class="panel-title">⚙️ 系统设置</h2>
                <div class="settings-form">
                    <!-- 模型选择 -->
                    <div class="form-group">
                        <label class="form-label">选择模型</label>
                        <select class="form-input" id="modelSelect" onchange="onModelChange()">
                            <option value="">加载中...</option>
                        </select>
                    </div>
                    
                    <!-- 当前模型信息 -->
                    <div id="currentModelInfo" style="background:rgba(102,126,234,0.1);padding:15px;border-radius:8px;margin-bottom:15px;display:none;">
                        <div style="color:#667eea;font-weight:bold;margin-bottom:10px;">当前模型信息</div>
                        <div style="font-size:13px;color:#a0aec0;">
                            <div>API 地址: <span id="currentApiUrl" style="color:#fff;"></span></div>
                            <div>模型: <span id="currentModel" style="color:#fff;"></span></div>
                            <div>API Key: <span id="currentApiKey" style="color:#4ade80;">已配置</span></div>
                        </div>
                    </div>
                    
                    <!-- API 配置 -->
                    <div class="form-group"><label class="form-label">API 地址</label><input type="text" class="form-input" id="apiUrl" placeholder="https://api.example.com/v1"></div>
                    <div class="form-group"><label class="form-label">API Key</label><input type="password" class="form-input" id="apiKey" placeholder="sk-xxx..."></div>
                    <div class="form-group"><label class="form-label">模型名称</label><input type="text" class="form-input" id="modelName" placeholder="gpt-4, MiniMax-M2.5..."></div>
                    
                    <button class="save-btn" onclick="saveSettings()">💾 保存并应用</button>
                    
                    <!-- 添加自定义模型 -->
                    <div style="margin-top:25px;padding-top:20px;border-top:1px solid rgba(102,126,234,0.2);">
                        <div class="form-group"><label class="form-label">模型名称</label><input type="text" class="form-input" id="customModelName" placeholder="自定义模型名"></div>
                        <div class="form-group"><label class="form-label">API 地址</label><input type="text" class="form-input" id="customApiUrl" placeholder="https://api.example.com/v1"></div>
                        <div class="form-group"><label class="form-label">模型 ID</label><input type="text" class="form-input" id="customModelId" placeholder="如: gpt-4, claude-3..."></div>
                        <button class="save-btn" style="background:rgba(102,126,234,0.3);" onclick="addCustomModel()">➕ 添加模型</button>
                    </div>
                </div>
            </div>
            
            <!-- 本地运行面板 -->
            <div class="panel" id="local">
                <h2 class="panel-title">💻 本地运行状态</h2>
                <div id="localStatus" style="color:#666;padding:20px;">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- 添加项目模态框 -->
    <div class="modal" id="addProjectModal">
        <div class="modal-content">
            <div class="modal-title">添加新项目</div>
            <div class="form-group">
                <label class="form-label">项目名称</label>
                <input type="text" class="form-input" id="newProjectName" placeholder="输入项目名称">
            </div>
            <div class="form-group">
                <label class="form-label">项目描述</label>
                <input type="text" class="form-input" id="newProjectDesc" placeholder="输入项目描述">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmAddProject()">添加</button>
            </div>
        </div>
    </div>
    
    <!-- 技能详情弹窗 -->
    <div class="skill-detail" id="skillDetail">
        <div class="skill-detail-content">
            <button class="skill-close" onclick="closeSkillDetail()">&times;</button>
            <div class="skill-detail-title" id="skillDetailTitle"></div>
            <div class="skill-detail-desc" id="skillDetailDesc"></div>
        </div>
    </div>
    
    <!-- 项目详情弹窗 -->
    <div class="modal" id="projectDetailModal">
        <div class="modal-content" style="width:600px;max-height:80vh;overflow-y:auto;">
            <div class="modal-title" id="projectDetailTitle"></div>
            
            <!-- 项目信息编辑 -->
            <div class="form-group">
                <label class="form-label">项目描述</label>
                <textarea class="form-input" id="projectDetailDesc" rows="2" style="resize:vertical;"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">状态</label>
                <select class="form-input" id="projectDetailStatus">
                    <option value="开发中">开发中</option>
                    <option value="已完成">已完成</option>
                    <option value="维护中">维护中</option>
                    <option value="已暂停">已暂停</option>
                </select>
            </div>
            
            <!-- 项目文件列表 -->
            <div style="margin-top:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <label class="form-label" style="margin:0;">📁 项目文件</label>
                    <button onclick="refreshProjectFiles()" style="background:none;border:none;color:#667eea;cursor:pointer;font-size:12px;">🔄 刷新</button>
                </div>
                <div id="projectFilesList" style="background:rgba(0,0,0,0.3);border-radius:8px;padding:10px;max-height:200px;overflow-y:auto;">
                    <div style="color:#666;text-align:center;padding:20px;">加载中...</div>
                </div>
            </div>
            
            <!-- 文件操作 -->
            <div id="fileEditor" style="display:none;margin-top:15px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
                    <label class="form-label" style="margin:0;" id="currentFileName"></label>
                    <button onclick="closeFileEditor()" style="background:none;border:none;color:#ef4444;cursor:pointer;">✕</button>
                </div>
                <textarea class="form-input" id="fileContent" rows="10" style="font-family:monospace;font-size:12px;"></textarea>
                <button class="save-btn" style="margin-top:10px;width:100%;" onclick="saveFile()">💾 保存文件</button>
            </div>
            
            <div class="modal-buttons">
                <button class="modal-btn cancel" style="background:#ef4444;" onclick="deleteProject()">删除项目</button>
                <button class="modal-btn cancel" onclick="closeProjectDetail()">关闭</button>
                <button class="modal-btn confirm" onclick="saveProject()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 子代理详情弹窗 -->
    <div class="modal" id="agentDetailModal">
        <div class="modal-content" style="width:600px;max-height:80vh;overflow-y:auto;">
            <div class="modal-title" id="agentDetailTitle"></div>
            
            <!-- 子代理信息 -->
            <div class="form-group">
                <label class="form-label">描述</label>
                <textarea class="form-input" id="agentDetailDesc" rows="2" style="resize:vertical;"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">状态</label>
                <select class="form-input" id="agentDetailStatus">
                    <option value="idle">空闲</option>
